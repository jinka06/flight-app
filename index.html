<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Weather forecast & Activity planner</title>
  <script type="module" crossorigin src="/flight-app/assets/index-BfvX-XGI.js"></script>
  <link rel="stylesheet" crossorigin href="/flight-app/assets/index-3L9NwQRQ.css">
</head>

<body>
	<div class="welcome-page">
		<div class="title">Fly Around</div>
		<button class="welcome-btn">Let's Begin</button>
	</div>
	<form class="flying-info">
		<label for="flying-from">Flying from</label>
		<input type="text" class="flying-desc" id="flying-from">
		<label for="flying-to">Flying to</label>
		<input type="text" name="flying-to" class="flying-desc" id="flying-to">
		<label for="date-from">From date</label>
		<input type="date" class="date-desc" id="date-from">
		<label for="date-to">To date</label>
		<input type="date" class="date-desc" id="date-to">
		<label for="budget">Budget</label>
		<input type="number" class="budget" id="budget">
		<button class="submit-btn" type="submit">Plan my Trip</button>
	</form>
	<div class="err-txt"></div>

	<div class="results-section">
		<div class="result-box">
			<div class="result-title">Trip:</div>
			<div id="found-trip" class="result-content"></div>
		</div>

		<div class="result-box">
			<div class="result-title">Start Date:</div>
			<div id="found-start-date" class="result-content"></div>
		</div>

		<div class="result-box">
			<div class="result-title">End Date:</div>
			<div id="found-end-date" class="result-content"></div>
		</div>

		<div class="result-box">
			<div class="result-title">Recommended Activities:</div>
			<div id="found-activities" class="result-content activities-content"></div>
		</div>

		<div class="reset-container">
			<button class="reset-btn" id="reset-btn">Plan a New Trip</button>
		</div>
	</div>

</body>
</html>
